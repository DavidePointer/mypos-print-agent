<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Comandan Print Agent</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #0f0f0f;
      color: #f0f0f0;
      padding: 24px;
      user-select: none;
    }

    .header {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 24px;
    }

    .logo {
      font-size: 32px;
    }

    .title {
      font-size: 18px;
      font-weight: 700;
      color: #fff;
    }

    .subtitle {
      font-size: 12px;
      color: #666;
      margin-top: 2px;
    }

    .status-card {
      background: #1a1a1a;
      border: 1px solid #2a2a2a;
      border-radius: 12px;
      padding: 16px;
      margin-bottom: 12px;
    }

    .status-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 8px 0;
      border-bottom: 1px solid #2a2a2a;
    }

    .status-row:last-child {
      border-bottom: none;
    }

    .status-label {
      font-size: 13px;
      color: #888;
    }

    .status-value {
      font-size: 13px;
      font-weight: 600;
      color: #f0f0f0;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 4px 10px;
      border-radius: 20px;
      font-size: 12px;
      font-weight: 700;
    }

    .badge-green {
      background: #0d2e0d;
      color: #4caf50;
      border: 1px solid #1b5e1b;
    }

    .badge-red {
      background: #2e0d0d;
      color: #f44336;
      border: 1px solid #5e1b1b;
    }

    .dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      animation: pulse 2s infinite;
    }

    .dot-green { background: #4caf50; }
    .dot-red { background: #f44336; animation: none; }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.4; }
    }

    .section-title {
      font-size: 11px;
      font-weight: 700;
      color: #555;
      text-transform: uppercase;
      letter-spacing: 0.8px;
      margin-bottom: 8px;
    }

    .log-box {
      background: #111;
      border: 1px solid #2a2a2a;
      border-radius: 8px;
      padding: 12px;
      font-family: "Consolas", "Courier New", monospace;
      font-size: 11px;
      color: #888;
      height: 100px;
      overflow-y: auto;
      line-height: 1.6;
    }

    .log-line { color: #aaa; }
    .log-success { color: #4caf50; }
    .log-error { color: #f44336; }

    .footer {
      margin-top: 20px;
      text-align: center;
      font-size: 11px;
      color: #444;
    }

    .btn {
      display: block;
      width: 100%;
      padding: 10px;
      background: #1a1a1a;
      border: 1px solid #333;
      border-radius: 8px;
      color: #f0f0f0;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      margin-top: 8px;
      transition: background 0.15s;
    }

    .btn:hover { background: #252525; }
  </style>
</head>
<body>
  <div class="header">
    <div class="logo">🖨️</div>
    <div>
      <div class="title">Comandan Print Agent</div>
      <div class="subtitle">by Pointer S.r.l. — v1.1.0</div>
    </div>
  </div>

  <div class="section-title">Stato</div>
  <div class="status-card">
    <div class="status-row">
      <span class="status-label">Server</span>
      <span id="server-status">
        <span class="badge badge-green">
          <span class="dot dot-green"></span>
          Attivo
        </span>
      </span>
    </div>
    <div class="status-row">
      <span class="status-label">Porta</span>
      <span class="status-value">8888</span>
    </div>
    <div class="status-row">
      <span class="status-label">Stampe totali</span>
      <span class="status-value" id="print-count">0</span>
    </div>
    <div class="status-row">
      <span class="status-label">Ultima stampa</span>
      <span class="status-value" id="last-print">—</span>
    </div>
    <div class="status-row">
      <span class="status-label">Avvio automatico</span>
      <span class="status-value" id="autolaunch">—</span>
    </div>
  </div>

  <div class="section-title" style="margin-top: 16px">Log attività</div>
  <div class="log-box" id="log-box">
    <div class="log-line">Print Agent avviato...</div>
  </div>

  <button class="btn" onclick="testConnection()">🔍 Testa connessione</button>
  <button class="btn" onclick="checkUpdate()" style="margin-top:4px">🔄 Controlla aggiornamenti</button>

  <div class="footer">
    Doppio click sull'icona nel system tray per aprire questa finestra
  </div>

  <script>
    const { app } = require("electron").remote || require("@electron/remote");
    const { ipcRenderer } = require("electron");

    // Polling stato ogni 2 secondi
    function refreshStatus() {
      try {
        const { app: electronApp } = require("electron").remote || {};
        fetch("http://localhost:8888/status")
          .then(r => r.json())
          .then(data => {
            document.getElementById("print-count").textContent = data.printCount || 0;
            document.getElementById("last-print").textContent = data.lastPrint
              ? new Date(data.lastPrint).toLocaleTimeString("it-IT")
              : "—";
            document.getElementById("server-status").innerHTML = `
              <span class="badge badge-green">
                <span class="dot dot-green"></span>
                Attivo
              </span>`;
            addLog(`✅ Server attivo — ${data.printCount} stampe`, "log-success");
          })
          .catch(() => {
            document.getElementById("server-status").innerHTML = `
              <span class="badge badge-red">
                <span class="dot dot-red"></span>
                Non raggiungibile
              </span>`;
          });
      } catch (e) {
        console.error(e);
      }
    }

    function testConnection() {
      addLog("🔍 Test connessione in corso...", "log-line");
      fetch("http://localhost:8888/status")
        .then(r => r.json())
        .then(data => {
          addLog(`✅ Connessione OK — porta 8888 attiva`, "log-success");
        })
        .catch(() => {
          addLog(`❌ Server non raggiungibile su porta 8888`, "log-error");
        });
    }

    function addLog(message, cls = "log-line") {
      const box = document.getElementById("log-box");
      const line = document.createElement("div");
      line.className = cls;
      const time = new Date().toLocaleTimeString("it-IT");
      line.textContent = `[${time}] ${message}`;
      box.appendChild(line);
      box.scrollTop = box.scrollHeight;

      // Mantieni max 50 righe
      while (box.children.length > 50) {
        box.removeChild(box.firstChild);
      }
    }

    refreshStatus();
    setInterval(refreshStatus, 5000);

    function checkUpdate() {
      addLog("🔄 Controllo aggiornamenti in corso...", "log-line");
      fetch("http://localhost:8888/status")
        .then(r => r.json())
        .then(data => {
          addLog("✅ v" + (data.version || "1.0.0") + " in uso — aggiornamenti controllati", "log-success");
        })
        .catch(() => addLog("❌ Server non raggiungibile", "log-error"));
    }
  </script>
</body>
</html>
